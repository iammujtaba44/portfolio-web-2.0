<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient border ring -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="48%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>

    <!-- Dark background fill -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#080c18"/>
      <stop offset="100%" stop-color="#0c1426"/>
    </linearGradient>

    <!-- Text gradient — bright blue → teal -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="50%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>

    <!-- Accent bar gradient -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>

    <!-- Soft glow behind letters -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="blur"/>
      <feFlood flood-color="#2563eb" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Noise-like inner highlight -->
    <radialGradient id="innerShine" cx="30%" cy="20%" r="60%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 1. Gradient border (full rounded rect) -->
  <rect width="512" height="512" rx="104" fill="url(#borderGrad)"/>

  <!-- 2. Dark background inset by 3px (creates border effect) -->
  <rect x="3" y="3" width="506" height="506" rx="101" fill="url(#bgGrad)"/>

  <!-- 3. Inner shine overlay (subtle depth) -->
  <rect x="3" y="3" width="506" height="506" rx="101" fill="url(#innerShine)"/>

  <!-- 4. Ambient glow — top-left blue -->
  <circle cx="90"  cy="90"  r="160" fill="#2563eb" fill-opacity="0.09"/>

  <!-- 5. Ambient glow — bottom-right teal -->
  <circle cx="422" cy="422" r="140" fill="#14b8a6" fill-opacity="0.07"/>

  <!-- 6. Decorative dot cluster — top right -->
  <circle cx="405" cy="105" r="5.5" fill="#3b82f6" fill-opacity="0.55"/>
  <circle cx="425" cy="105" r="3.5" fill="#8b5cf6" fill-opacity="0.45"/>
  <circle cx="440" cy="105" r="2.5" fill="#2dd4bf" fill-opacity="0.35"/>

  <!-- 7. Decorative dot — bottom left -->
  <circle cx="105" cy="405" r="4" fill="#2dd4bf" fill-opacity="0.30"/>

  <!-- 8. Glow bloom behind text (rendered behind main text) -->
  <text
    x="258" y="342"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="248"
    letter-spacing="-14"
    text-anchor="middle"
    fill="#2563eb"
    fill-opacity="0.28"
    filter="url(#glow)"
  >MJ</text>

  <!-- 9. Main MJ monogram with gradient -->
  <text
    x="258" y="342"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="248"
    letter-spacing="-14"
    text-anchor="middle"
    fill="url(#textGrad)"
  >MJ</text>

  <!-- 10. Accent bar below text -->
  <rect x="158" y="364" width="196" height="6" rx="3" fill="url(#barGrad)" fill-opacity="0.75"/>

  <!-- 11. Centre dot accent below bar -->
  <circle cx="256" cy="387" r="4" fill="url(#barGrad)" fill-opacity="0.50"/>
</svg>
